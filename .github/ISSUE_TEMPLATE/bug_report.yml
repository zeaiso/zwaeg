name: 🐞 Bug report
description: Something isn't working the way it should
labels: ['bug']
body:
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: Please search existing issues to avoid duplicates.
      options:
        - label: I have searched the existing issues
          required: true
  - type: dropdown
    attributes:
      label: Area
      description: Which part of Zwäg is affected?
      options:
        - Diary (meals, water, weight, mood, streak)
        - Recipes / shopping list
        - Scanner (barcode / label / custom foods)
        - Fasting
        - Battles / challenges
        - Calculators
        - Progress / charts
        - Buddy / avatar studio
        - Widgets / Live Activity / Apple Watch
        - Languages / translations
        - Onboarding / profile
        - Other / not sure
    validations:
      required: true
  - type: textarea
    attributes:
      label: Current behavior
      description: A concise description of what's happening.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. See error
    validations:
      required: false
  - type: textarea
    attributes:
      label: Environment
      description: Helps narrow things down.
      value: |
        - Zwäg version / commit:
        - iOS version:
        - Device: (e.g. iPhone 17 Pro, simulator)
        - App language:
      render: markdown
    validations:
      required: true
  - type: textarea
    attributes:
      label: Screenshots, logs, anything else?
      description: |
        You can drag & drop files here.

        ⚠️ Zwäg holds personal health data. Please redact weight, health details and anything else personal before posting.
    validations:
      required: false
