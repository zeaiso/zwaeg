name: Close stale issues

# Auto-closes issues that are waiting on the reporter for more info.
on:
  schedule:
    - cron: '0 6 * * *' # daily, 06:00 UTC
  workflow_dispatch: # allow manual runs

permissions:
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@1e223db275d687790206a7acac4d1a11bd6fe629 # v10.4.0
        with:
          # Only touch issues explicitly flagged as awaiting a response
          only-labels: 'needs more info'
          days-before-stale: 14
          days-before-close: 7
          stale-issue-label: 'stale'
          close-issue-message: >
            This issue was automatically closed because the requested
            information wasn't provided. Happy to reopen it once you can add
            the missing details, just comment below.
          # Don't sweep PRs with this job
          days-before-pr-stale: -1
          days-before-pr-close: -1
