name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build
        run: |
          set -o pipefail
          xcodebuild -project Zwaeg.xcodeproj -scheme Zwaeg \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO build | tail -50

      - name: Validate Swiss food list
        run: python3 -c "import json; d=json.load(open('Zwaeg/Resources/swiss_foods.json')); assert len(d) > 100; print(len(d), 'foods ok')"
