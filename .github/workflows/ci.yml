name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    # Both build switches: without battles (what a fresh clone gets) and with
    # them. Simulator builds do not enforce entitlements, so the battles build
    # needs no Apple Developer account here, and the code stays compiled and
    # type-checked either way.
    name: Build (iOS Simulator, battles=${{ matrix.battles }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        battles: [false, true]
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate
        env:
          ZWAEG_BATTLES: ${{ matrix.battles }}

      - name: Build
        run: |
          set -o pipefail
          xcodebuild -project Zwaeg.xcodeproj -scheme Zwaeg \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO build | tail -50

      - name: Validate Swiss food list
        run: python3 -c "import json; d=json.load(open('Zwaeg/Resources/swiss_foods.json')); assert len(d) > 100; print(len(d), 'foods ok')"
