name: Zwaeg
options:
  bundleIdPrefix: ch.emanuell
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
targets:
  Zwaeg:
    type: application
    platform: iOS
    sources:
      - Zwaeg
    dependencies:
      - target: ZwaegWidgets
      - target: ZwaegWatch
    info:
      path: Zwaeg/Info.plist
      properties:
        CFBundleDisplayName: Zwäg
        UILaunchScreen: {}
        NSCameraUsageDescription: Zwäg benötigt die Kamera zum Scannen von Barcodes.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSHealthShareUsageDescription: Zwäg liest Schritte und Aktivenergie, um deinen Tagesverbrauch anzuzeigen.
        NSHealthUpdateUsageDescription: Zwäg speichert dein geloggtes Gewicht in Apple Health.
        NSSupportsLiveActivities: true
        UIAppFonts:
          - Fredoka-Regular.ttf
          - Fredoka-Medium.ttf
          - Fredoka-SemiBold.ttf
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconName: AppIcon
          CFBundleAlternateIcons:
            AppIconMidnight:
              CFBundleIconFiles:
                - AppIconMidnight
            AppIconMono:
              CFBundleIconFiles:
                - AppIconMono
    entitlements:
      path: Zwaeg/Zwaeg.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.security.application-groups:
          - group.ch.emanuell.zwaeg
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ch.emanuell.zwaeg
  ZwaegWidgets:
    type: app-extension
    platform: iOS
    sources:
      - ZwaegWidgets
      - Zwaeg/Shared
      - path: Zwaeg/Resources/Fonts
        buildPhase: resources
    info:
      path: ZwaegWidgets/Info.plist
      properties:
        CFBundleDisplayName: Zwäg
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        UIAppFonts:
          - Fredoka-Regular.ttf
          - Fredoka-Medium.ttf
          - Fredoka-SemiBold.ttf
    entitlements:
      path: ZwaegWidgets/ZwaegWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.ch.emanuell.zwaeg
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ch.emanuell.zwaeg.widgets
        SKIP_INSTALL: true
  ZwaegWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - ZwaegWatch
      - Zwaeg/Shared/WatchDaySnapshot.swift
    info:
      path: ZwaegWatch/Info.plist
      properties:
        CFBundleDisplayName: Zwäg
        WKApplication: true
        WKCompanionAppBundleIdentifier: ch.emanuell.zwaeg
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ch.emanuell.zwaeg.watchkitapp
        SKIP_INSTALL: true
        TARGETED_DEVICE_FAMILY: "4"
