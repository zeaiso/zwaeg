name: Zwaeg
include:
  # Battles talk to CloudKit, which needs a paid Apple Developer account and the
  # container from docs/DEVELOPMENT.md. An unset variable counts as false, so a
  # plain `xcodegen generate` yields an app that builds and runs on a free Apple
  # ID with battles compiled out. Turn them on with ZWAEG_BATTLES=true, or put it
  # in .env and use `make generate` (see .env.example).
  - path: Config/Battles.yml
    enable: ${ZWAEG_BATTLES}
configFiles:
  Debug: Config/Signing.xcconfig
  Release: Config/Signing.xcconfig
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    # iPhone and iPad. Deliberate: 1.0 shipped with iPad support (XcodeGen's
    # target default overrode an earlier project-level "1"), and the App Store
    # never allows removing a device family once a version is released, so
    # every future build must keep working on iPad.
    TARGETED_DEVICE_FAMILY: "1,2"
    CURRENT_PROJECT_VERSION: "5"
    MARKETING_VERSION: "1.1.0"
# Every identifier derives from ZWAEG_BUNDLE_ID_PREFIX (Config/Signing.xcconfig,
# overridable in the gitignored Config/Local.xcconfig). Xcode expands $(...) in
# build settings, Info.plist values and entitlements at build time, and the app
# reads the derived group/container names back from Info.plist at runtime, so
# no identifier is hardcoded twice.
targets:
  Zwaeg:
    type: application
    platform: iOS
    sources:
      - Zwaeg
    dependencies:
      - target: ZwaegWidgets
      - target: ZwaegWatch
    info:
      path: Zwaeg/Info.plist
      properties:
        CFBundleDisplayName: Zwäg
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        NSCameraUsageDescription: Zwäg benötigt die Kamera zum Scannen von Barcodes.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Portrait-only apps must either support all four orientations for iPad
        # multitasking or declare full screen; App Store validation enforces it.
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
        NSHealthShareUsageDescription: Zwäg liest Schritte und Aktivenergie, um deinen Tagesverbrauch anzuzeigen.
        NSHealthUpdateUsageDescription: Zwäg speichert dein geloggtes Gewicht in Apple Health.
        NSSupportsLiveActivities: true
        ZwaegAppGroup: group.$(ZWAEG_BUNDLE_ID_PREFIX).zwaeg
        ZwaegCloudKitContainer: iCloud.$(ZWAEG_BUNDLE_ID_PREFIX).zwaeg
        UIAppFonts:
          - Fredoka-Regular.ttf
          - Fredoka-Medium.ttf
          - Fredoka-SemiBold.ttf
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconName: AppIcon
          CFBundleAlternateIcons:
            AppIconMidnight:
              CFBundleIconFiles:
                - AppIconMidnight
            AppIconMono:
              CFBundleIconFiles:
                - AppIconMono
    entitlements:
      path: Zwaeg/Zwaeg.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.security.application-groups:
          - group.$(ZWAEG_BUNDLE_ID_PREFIX).zwaeg
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(ZWAEG_BUNDLE_ID_PREFIX).zwaeg
  ZwaegWidgets:
    type: app-extension
    platform: iOS
    sources:
      - ZwaegWidgets
      - Zwaeg/Shared
      - path: Zwaeg/Resources/Fonts
        buildPhase: resources
    info:
      path: ZwaegWidgets/Info.plist
      properties:
        CFBundleDisplayName: Zwäg
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        ZwaegAppGroup: group.$(ZWAEG_BUNDLE_ID_PREFIX).zwaeg
        UIAppFonts:
          - Fredoka-Regular.ttf
          - Fredoka-Medium.ttf
          - Fredoka-SemiBold.ttf
    entitlements:
      path: ZwaegWidgets/ZwaegWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.$(ZWAEG_BUNDLE_ID_PREFIX).zwaeg
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(ZWAEG_BUNDLE_ID_PREFIX).zwaeg.widgets
        SKIP_INSTALL: true
  ZwaegWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - ZwaegWatch
      - Zwaeg/Shared/WatchDaySnapshot.swift
    dependencies:
      - target: ZwaegWatchWidgets
    info:
      path: ZwaegWatch/Info.plist
      properties:
        CFBundleDisplayName: Zwäg
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        WKApplication: true
        WKCompanionAppBundleIdentifier: $(ZWAEG_BUNDLE_ID_PREFIX).zwaeg
        ZwaegAppGroup: group.$(ZWAEG_BUNDLE_ID_PREFIX).zwaeg
        CFBundleIconName: AppIcon
    entitlements:
      path: ZwaegWatch/ZwaegWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.$(ZWAEG_BUNDLE_ID_PREFIX).zwaeg
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(ZWAEG_BUNDLE_ID_PREFIX).zwaeg.watchkitapp
        SKIP_INSTALL: true
        TARGETED_DEVICE_FAMILY: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  ZwaegWatchWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - ZwaegWatchWidgets
      - Zwaeg/Shared/WatchDaySnapshot.swift
    info:
      path: ZwaegWatchWidgets/Info.plist
      properties:
        CFBundleDisplayName: Zwäg
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        ZwaegAppGroup: group.$(ZWAEG_BUNDLE_ID_PREFIX).zwaeg
    entitlements:
      path: ZwaegWatchWidgets/ZwaegWatchWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.$(ZWAEG_BUNDLE_ID_PREFIX).zwaeg
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(ZWAEG_BUNDLE_ID_PREFIX).zwaeg.watchkitapp.widgets
        SKIP_INSTALL: true
        TARGETED_DEVICE_FAMILY: "4"
