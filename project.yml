name: Zwaeg
options:
  bundleIdPrefix: ch.emanuell
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
targets:
  Zwaeg:
    type: application
    platform: iOS
    sources:
      - Zwaeg
    info:
      path: Zwaeg/Info.plist
      properties:
        CFBundleDisplayName: Zwäg
        UILaunchScreen: {}
        NSCameraUsageDescription: Zwäg benötigt die Kamera zum Scannen von Barcodes.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSHealthShareUsageDescription: Zwäg liest Schritte und Aktivenergie, um deinen Tagesverbrauch anzuzeigen.
        NSHealthUpdateUsageDescription: Zwäg speichert dein geloggtes Gewicht in Apple Health.
        UIAppFonts:
          - Fredoka-Regular.ttf
          - Fredoka-Medium.ttf
          - Fredoka-SemiBold.ttf
    entitlements:
      path: Zwaeg/Zwaeg.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ch.emanuell.zwaeg
